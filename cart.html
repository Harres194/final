<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart</title>
<link rel="stylesheet" href="cart.css">
</head>

<body>

<header>
<div class="logo">
<img src="завантаження.png" class="header_img">
</div>

<div class="nav-container">
<nav>
<ul class="nav-bar">
<li class="nav-item"><a href="" class="nav-link">Випічка</a></li>
<li class="nav-item"><a href="" class="nav-link">Доставка</a></li>
<li class="nav-item"><a href="" class="nav-link">Оплата</a></li>
</ul>
</nav>
</div>

<div class="cart">
<a href="cart.html">
<span class="card-count"></span>
</a>
</div>

</header>

<main>

<h1>Ваш кошик</h1>

<div class="back-btn-container">
    <a href="index.html" class="back-btn">⬅ Назад до покупок</a>
</div>

<div class="cart-items"></div>

<h2 class="total"></h2>

<div class="checkout-container">
    <button id="checkout-btn">🛒 Оформити замовлення</button>
</div>

<!-- Модальне вікно для оформлення замовлення -->
<div id="checkoutModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>Оформити замовлення</h2>
    <form id="checkoutForm">
      <label for="name">Ім'я:</label>
      <input type="text" id="name" name="name" required>

      <label for="address">Адреса:</label>
      <input type="text" id="address" name="address" required>

      <label for="phone">Телефон:</label>
      <input type="tel" id="phone" name="phone" placeholder="+380XXXXXXXXX" required>

      <button type="submit">Підтвердити замовлення</button>
      
    </form>
  </div>
</div>
<div class="promo-code">
  <input type="text" id="promo-input" placeholder="Введіть код знижки">
  <button id="apply-promo">Застосувати</button>
  <p id="promo-message"></p>
</div>
</main>

<script src="js/cart.js"></script>
<script src="js/cart-page.js"></script>

</body>
</html>
